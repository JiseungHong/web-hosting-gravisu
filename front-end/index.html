<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="./assets/title_icon.svg" alt="title icon" class="title_icon">
            <div class="title">
                OpenHands AI
            </div>
        </div>
        <div class="step1">
            <div class="step_title">Step 1</div>
            <div class="myField">
                <input type="text" placeholder="Enter your text here">
            </div>
        </div>
        <div class="step2">
            <div class="step_title">Step 2</div>
            <div class="myField">
                <textarea placeholder="Enter your text here"></textarea>
            </div>
        </div>
        <div class="step3">
            <div class="step_title">Step 3</div>
            <div class="myField">
                <button class="help_button">Help</button>
            </div>
        </div>
        <div class="footer">
            <div class="dog-box">
                <img src="./assets/dog.png" alt="Dog Image">
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
